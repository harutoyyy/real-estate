<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不動産投資シミュレーション</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; background: #f0f2f5; color: #333; }
header { background: linear-gradient(135deg, #1a237e, #283593); color: #fff; padding: 18px 32px; text-align: center; }
header h1 { font-size: 1.5rem; letter-spacing: 0.05em; }
.container { display: flex; gap: 24px; padding: 24px; max-width: 1600px; margin: 0 auto; }
.left { flex: 0 0 480px; }
.right { flex: 1; min-width: 0; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.95rem; font-weight: 600; background: #ddd; color: #666; transition: all .2s; }
.tab-btn.active { background: #fff; color: #1a237e; box-shadow: 0 -2px 6px rgba(0,0,0,.08); }
.tab-name-input { border: none; background: transparent; font-size: 0.95rem; font-weight: 600; color: inherit; width: 100%; text-align: center; outline: none; }

/* Card */
.card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.07); padding: 20px; margin-bottom: 16px; }
.card h3 { font-size: 0.9rem; color: #1a237e; margin-bottom: 12px; border-bottom: 2px solid #e8eaf6; padding-bottom: 6px; }

/* Form */
.form-row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
.form-row label { flex: 0 0 120px; font-size: 0.85rem; color: #555; }
.form-row input.num-input { flex: 1; padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; text-align: right; }
.form-row input.num-input:focus { border-color: #3f51b5; outline: none; box-shadow: 0 0 0 2px rgba(63,81,181,.15); }
.form-row .unit { flex: 0 0 50px; font-size: 0.8rem; color: #888; }

/* Auto calc display */
.auto-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
.auto-row label { flex: 0 0 120px; font-size: 0.85rem; color: #555; }
.auto-row .value { flex: 1; font-size: 0.85rem; font-weight: 600; color: #1a237e; text-align: right; padding-right: 10px; }
.auto-row .unit { flex: 0 0 50px; font-size: 0.8rem; color: #888; }

/* Toggle */
.toggle-wrap { display: flex; align-items: center; gap: 6px; }
.toggle-btn { padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px; background: #f5f5f5; cursor: pointer; font-size: 0.75rem; color: #666; transition: all .2s; }
.toggle-btn.active { background: #3f51b5; color: #fff; border-color: #3f51b5; }

/* Floor rows */
.floor-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
.floor-row .floor-label { flex: 0 0 120px; font-size: 0.85rem; color: #555; }
.floor-row .floor-area { font-size: 0.8rem; color: #888; flex: 0 0 90px; text-align: right; }
.floor-row input.num-input { flex: 1; padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; text-align: right; }
.floor-row input.num-input:focus { border-color: #3f51b5; outline: none; box-shadow: 0 0 0 2px rgba(63,81,181,.15); }
.floor-row .unit { flex: 0 0 60px; font-size: 0.8rem; color: #888; }

/* Result */
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.result-card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.07); padding: 20px; }
.result-card h3 { font-size: 1rem; color: #1a237e; margin-bottom: 14px; border-bottom: 2px solid #e8eaf6; padding-bottom: 6px; text-align: center; }
.result-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f0f0f0; }
.result-row:last-child { border-bottom: none; }
.result-row .r-label { font-size: 0.85rem; color: #555; }
.result-row .r-value { font-size: 0.9rem; font-weight: 600; text-align: right; }
.r-value.positive { color: #2e7d32; }
.r-value.negative { color: #c62828; }

/* Diff */
.diff-card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.07); padding: 20px; margin-top: 16px; }
.diff-card h3 { font-size: 1rem; color: #1a237e; margin-bottom: 14px; border-bottom: 2px solid #e8eaf6; padding-bottom: 6px; text-align: center; }
.diff-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f0f0f0; }
.diff-row:last-child { border-bottom: none; }
.diff-row .d-label { font-size: 0.85rem; color: #555; }
.diff-row .d-value { font-size: 0.85rem; font-weight: 600; }
.highlight-a { background: rgba(33,150,243,.08); border-radius: 4px; padding: 2px 6px; color: #1565c0; }
.highlight-b { background: rgba(76,175,80,.08); border-radius: 4px; padding: 2px 6px; color: #2e7d32; }

/* Action buttons */
.btn-small { padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px; background: #f5f5f5; cursor: pointer; font-size: 0.75rem; color: #666; transition: all .2s; }
.btn-small:hover { background: #e0e0e0; }
.btn-reset { color: #c62828; border-color: #e0a0a0; }
.btn-reset:hover { background: #ffebee; }
.btn-apply { color: #1565c0; border-color: #90caf9; }
.btn-apply:hover { background: #e3f2fd; }
.card-header { display: flex; justify-content: space-between; align-items: center; }
.card-header h3 { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }
.card-header-bar { margin-bottom: 12px; border-bottom: 2px solid #e8eaf6; padding-bottom: 6px; }
.rent-actions { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
.rent-actions input.num-input { width: 120px; padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; text-align: right; }

.hidden { display: none; }

@media (max-width: 1024px) {
  .container { flex-direction: column; }
  .left { flex: none; width: 100%; }
  .result-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <h1>不動産投資シミュレーション</h1>
</header>

<div class="container">
  <!-- 左カラム -->
  <div class="left">
    <div class="tabs">
      <button class="tab-btn active" data-tab="0">
        <input type="text" class="tab-name-input" value="件名A" data-idx="0">
      </button>
      <button class="tab-btn" data-tab="1">
        <input type="text" class="tab-name-input" value="件名B" data-idx="1">
      </button>
    </div>

    <div id="form-0" class="form-panel"></div>
    <div id="form-1" class="form-panel hidden"></div>
  </div>

  <!-- 右カラム -->
  <div class="right">
    <div class="result-grid">
      <div class="result-card" id="result-0"></div>
      <div class="result-card" id="result-1"></div>
    </div>
    <div class="diff-card" id="diff-panel"></div>
  </div>
</div>

<script>
const DATA = [{}, {}];
const NAMES = ["件名A", "件名B"];

const TSUBO = 3.30579;

const DEFAULTS = {
  landArea: '', landAreaUnit: 'sqm',
  landPrice: '', landPriceUnit: 'sqm',
  buildingPrice: '', buildingPriceUnit: 'sqm',
  coverageRatio: '', floorAreaRatio: '',
  expense1: '', expense1Mode: 'yen',
  expense2: '', expense2Mode: 'yen',
  saleRate: 5.5, taxRate: 33,
  rentUnit: 'sqm',
  rents: []
};

function init() {
  DATA[0] = { ...DEFAULTS, rents: [] };
  DATA[1] = { ...DEFAULTS, rents: [] };
  buildForm(0);
  buildForm(1);
  bindTabs();
  recalcAll();
}

function buildForm(idx) {
  const el = document.getElementById('form-' + idx);
  el.innerHTML = `
    <div class="card">
      <div class="card-header card-header-bar">
        <h3>土地・建物</h3>
        <button class="btn-small btn-reset" data-reset="land">リセット</button>
      </div>
      <div class="form-row">
        <label>土地面積</label>
        <input type="text" class="num-input" data-field="landArea" inputmode="decimal">
        <div class="toggle-wrap">
          <span class="toggle-btn active" data-toggle="landAreaUnit" data-val="sqm">㎡</span>
          <span class="toggle-btn" data-toggle="landAreaUnit" data-val="tsubo">坪</span>
        </div>
      </div>
      <div class="form-row">
        <label>土地単価</label>
        <input type="text" class="num-input" data-field="landPrice" inputmode="decimal">
        <div class="toggle-wrap">
          <span class="toggle-btn active" data-toggle="landPriceUnit" data-val="sqm">円/㎡</span>
          <span class="toggle-btn" data-toggle="landPriceUnit" data-val="tsubo">円/坪</span>
        </div>
      </div>
      <div class="form-row">
        <label>建物単価</label>
        <input type="text" class="num-input" data-field="buildingPrice" inputmode="decimal">
        <div class="toggle-wrap">
          <span class="toggle-btn active" data-toggle="buildingPriceUnit" data-val="sqm">円/㎡</span>
          <span class="toggle-btn" data-toggle="buildingPriceUnit" data-val="tsubo">円/坪</span>
        </div>
      </div>
      <div class="form-row">
        <label>建ぺい率</label>
        <input type="text" class="num-input" data-field="coverageRatio" inputmode="decimal">
        <span class="unit">%</span>
      </div>
      <div class="form-row">
        <label>容積率</label>
        <input type="text" class="num-input" data-field="floorAreaRatio" inputmode="decimal">
        <span class="unit">%</span>
      </div>
      <div class="auto-row">
        <label>土地面積</label>
        <span class="value" id="landAreaConv-${idx}">-</span>
        <span class="unit" id="landAreaConvUnit-${idx}"></span>
      </div>
      <div class="auto-row">
        <label>土地単価</label>
        <span class="value" id="landPriceConv-${idx}">-</span>
        <span class="unit" id="landPriceConvUnit-${idx}"></span>
      </div>
      <div class="auto-row">
        <label>建物単価</label>
        <span class="value" id="buildingPriceConv-${idx}">-</span>
        <span class="unit" id="buildingPriceConvUnit-${idx}"></span>
      </div>
      <div class="auto-row">
        <label>建物面積</label>
        <span class="value" id="buildingArea-${idx}">-</span>
        <span class="unit">㎡</span>
      </div>
      <div class="auto-row">
        <label>フロア数</label>
        <span class="value" id="floorCount-${idx}">-</span>
        <span class="unit">階</span>
      </div>
    </div>

    <div class="card">
      <div class="card-header card-header-bar">
        <h3>経費</h3>
        <button class="btn-small btn-reset" data-reset="expense">リセット</button>
      </div>
      <div class="form-row">
        <label>経費①</label>
        <input type="text" class="num-input" data-field="expense1" inputmode="decimal">
        <div class="toggle-wrap">
          <span class="toggle-btn active" data-toggle="expense1Mode" data-val="yen">円</span>
          <span class="toggle-btn" data-toggle="expense1Mode" data-val="pct">%</span>
        </div>
      </div>
      <div class="form-row">
        <label>経費②</label>
        <input type="text" class="num-input" data-field="expense2" inputmode="decimal">
        <div class="toggle-wrap">
          <span class="toggle-btn active" data-toggle="expense2Mode" data-val="yen">円</span>
          <span class="toggle-btn" data-toggle="expense2Mode" data-val="pct">%</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header card-header-bar">
        <h3>家賃（フロアごと）</h3>
        <span style="display:flex;gap:6px;align-items:center;">
          <span class="toggle-wrap">
            <span class="toggle-btn active" data-toggle="rentUnit" data-val="sqm">円/㎡</span>
            <span class="toggle-btn" data-toggle="rentUnit" data-val="tsubo">円/坪</span>
          </span>
          <button class="btn-small btn-reset" data-reset="rent">リセット</button>
        </span>
      </div>
      <div class="rent-actions" id="rent-actions-${idx}">
        <input type="text" class="num-input" id="rent-all-${idx}" inputmode="decimal" placeholder="一括入力">
        <button class="btn-small btn-apply" id="rent-apply-${idx}">全フロア適用</button>
      </div>
      <div id="rent-rows-${idx}"><p style="font-size:.85rem;color:#999;">建ぺい率・容積率を入力するとフロアが生成されます</p></div>
    </div>

    <div class="card">
      <div class="card-header card-header-bar">
        <h3>その他</h3>
        <button class="btn-small btn-reset" data-reset="other">リセット</button>
      </div>
      <div class="form-row">
        <label>販売利率</label>
        <input type="text" class="num-input" data-field="saleRate" inputmode="decimal" value="5.5">
        <span class="unit">%</span>
      </div>
      <div class="form-row">
        <label>税率</label>
        <input type="text" class="num-input" data-field="taxRate" inputmode="decimal" value="33">
        <span class="unit">%</span>
      </div>
    </div>
  `;

  // Bind inputs
  el.querySelectorAll('input[data-field]').forEach(inp => {
    inp.addEventListener('input', () => {
      formatInput(inp);
      const f = inp.dataset.field;
      DATA[idx][f] = parseNum(inp.value);
      if (f === 'landArea' || f === 'coverageRatio' || f === 'floorAreaRatio') {
        updateFloors(idx);
      }
      recalcAll();
    });
  });

  // Bind toggles
  el.querySelectorAll('.toggle-btn[data-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const field = btn.dataset.toggle;
      const val = btn.dataset.val;
      DATA[idx][field] = val;
      const wrap = btn.parentElement;
      wrap.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (field === 'landAreaUnit' || field === 'rentUnit') {
        updateFloors(idx);
      }
      recalcAll();
    });
  });

  // Bind reset buttons
  el.querySelectorAll('.btn-reset[data-reset]').forEach(btn => {
    btn.addEventListener('click', () => {
      const section = btn.dataset.reset;
      resetSection(idx, section);
    });
  });

  // Bind rent apply-all button
  document.getElementById('rent-apply-' + idx).addEventListener('click', () => {
    applyAllRent(idx);
  });
  document.getElementById('rent-all-' + idx).addEventListener('input', (e) => {
    formatInput(e.target);
  });
}

function updateFloors(idx) {
  const d = DATA[idx];
  const coverage = num(d.coverageRatio);
  const far = num(d.floorAreaRatio);
  const landAreaRaw = num(d.landArea);
  const landArea = d.landAreaUnit === 'tsubo' ? landAreaRaw * TSUBO : landAreaRaw;

  const buildingArea = landArea * far / 100;
  const floorCount = coverage > 0 ? Math.floor(far / coverage) : 0;

  document.getElementById('buildingArea-' + idx).textContent = buildingArea > 0 ? fmt(buildingArea) : '-';
  document.getElementById('floorCount-' + idx).textContent = floorCount > 0 ? floorCount : '-';

  const container = document.getElementById('rent-rows-' + idx);
  if (floorCount <= 0) {
    container.innerHTML = '<p style="font-size:.85rem;color:#999;">建ぺい率・容積率を入力するとフロアが生成されます</p>';
    d.rents = [];
    return;
  }

  const floorArea = buildingArea / floorCount;
  const rentUnit = d.rentUnit || 'sqm';
  const areaLabel = rentUnit === 'tsubo' ? fmt(floorArea / TSUBO) + ' 坪' : fmt(floorArea) + ' ㎡';
  const unitLabel = rentUnit === 'tsubo' ? '円/坪' : '円/㎡';
  // Preserve existing rents
  const oldRents = d.rents.slice();
  d.rents = [];
  container.innerHTML = '';

  for (let i = 0; i < floorCount; i++) {
    const oldVal = i < oldRents.length ? oldRents[i] : '';
    d.rents.push(oldVal);

    const row = document.createElement('div');
    row.className = 'floor-row';
    row.innerHTML = `
      <span class="floor-label">${i + 1}F</span>
      <span class="floor-area">${areaLabel}</span>
      <input type="text" class="num-input" value="${oldVal !== '' ? addCommas(oldVal) : ''}" data-rent="${i}" inputmode="decimal">
      <span class="unit">${unitLabel}</span>
    `;
    row.querySelector('input').addEventListener('input', (e) => {
      formatInput(e.target);
      d.rents[i] = parseNum(e.target.value);
      recalcAll();
    });
    container.appendChild(row);
  }
}

function resetSection(idx, section) {
  const d = DATA[idx];
  const el = document.getElementById('form-' + idx);

  if (section === 'rent') {
    d.rents = d.rents.map(() => '');
    d.rentUnit = 'sqm';
    document.getElementById('rent-all-' + idx).value = '';
    // Reset rent unit toggles
    el.querySelectorAll('.toggle-btn[data-toggle="rentUnit"]').forEach(b => {
      b.classList.toggle('active', b.dataset.val === 'sqm');
    });
    updateFloors(idx);
    recalcAll();
    return;
  }

  const fieldMap = {
    land: { fields: ['landArea', 'landPrice', 'buildingPrice', 'coverageRatio', 'floorAreaRatio'],
            toggles: { landAreaUnit: 'sqm', landPriceUnit: 'sqm', buildingPriceUnit: 'sqm' } },
    expense: { fields: ['expense1', 'expense2'],
               toggles: { expense1Mode: 'yen', expense2Mode: 'yen' } },
    other: { fields: ['saleRate', 'taxRate'], toggles: {} }
  };

  const cfg = fieldMap[section];
  if (!cfg) return;

  // Reset data values
  cfg.fields.forEach(f => {
    if (f === 'saleRate') d[f] = 5.5;
    else if (f === 'taxRate') d[f] = 33;
    else d[f] = '';
  });

  // Reset input elements
  cfg.fields.forEach(f => {
    const inp = el.querySelector(`input[data-field="${f}"]`);
    if (!inp) return;
    if (f === 'saleRate') inp.value = '5.5';
    else if (f === 'taxRate') inp.value = '33';
    else inp.value = '';
  });

  // Reset toggles
  Object.entries(cfg.toggles).forEach(([field, defaultVal]) => {
    d[field] = defaultVal;
    el.querySelectorAll(`.toggle-btn[data-toggle="${field}"]`).forEach(b => {
      b.classList.toggle('active', b.dataset.val === defaultVal);
    });
  });

  if (section === 'land') updateFloors(idx);
  recalcAll();
}

function applyAllRent(idx) {
  const inp = document.getElementById('rent-all-' + idx);
  const val = parseNum(inp.value);
  if (val === '') return;
  const d = DATA[idx];
  d.rents = d.rents.map(() => val);
  updateFloors(idx);
  recalcAll();
}

function calc(idx) {
  const d = DATA[idx];
  // 坪→㎡変換: 面積は×TSUBO、単価は÷TSUBO
  const landAreaRaw = num(d.landArea);
  const landArea = d.landAreaUnit === 'tsubo' ? landAreaRaw * TSUBO : landAreaRaw;
  const landPriceRaw = num(d.landPrice);
  const landPrice = d.landPriceUnit === 'tsubo' ? landPriceRaw / TSUBO : landPriceRaw;
  const buildingPriceRaw = num(d.buildingPrice);
  const buildingPricePerSqm = d.buildingPriceUnit === 'tsubo' ? buildingPriceRaw / TSUBO : buildingPriceRaw;
  const coverage = num(d.coverageRatio);
  const far = num(d.floorAreaRatio);
  const saleRate = num(d.saleRate);
  const taxRate = num(d.taxRate);

  const buildingArea = landArea * far / 100;
  const floorCount = coverage > 0 ? Math.floor(far / coverage) : 0;
  const floorArea = floorCount > 0 ? buildingArea / floorCount : 0;

  const landTotal = landArea * landPrice;
  const buildingTotal = buildingArea * buildingPricePerSqm;
  const costTotal = landTotal + buildingTotal;

  const rentUnit = d.rentUnit || 'sqm';
  let monthlyRent = 0;
  for (let i = 0; i < floorCount; i++) {
    const r = i < d.rents.length ? num(d.rents[i]) : 0;
    // 坪入力の場合: 家賃単価(円/坪)→円/㎡に変換して㎡面積と掛ける
    const rPerSqm = rentUnit === 'tsubo' ? r / TSUBO : r;
    monthlyRent += floorArea * rPerSqm;
  }
  const yearlyRent = monthlyRent * 12;

  const salePrice = saleRate > 0 ? yearlyRent / (saleRate / 100) : 0;

  const e1 = num(d.expense1);
  const e2 = num(d.expense2);
  const exp1 = d.expense1Mode === 'pct' ? costTotal * e1 / 100 : e1;
  const exp2 = d.expense2Mode === 'pct' ? costTotal * e2 / 100 : e2;
  const expenseTotal = exp1 + exp2;

  const profit = salePrice - costTotal - expenseTotal;
  const profitRate = salePrice > 0 ? profit / salePrice : 0;
  const yieldRate = costTotal > 0 ? yearlyRent / costTotal : 0;
  const afterTax = profit * (1 - taxRate / 100);

  return {
    landTotal, buildingTotal, costTotal,
    buildingArea, floorCount,
    monthlyRent, yearlyRent, salePrice,
    expenseTotal, profit, profitRate,
    yieldRate, afterTax
  };
}

function recalcAll() {
  const results = [calc(0), calc(1)];
  renderResult(0, results[0]);
  renderResult(1, results[1]);
  renderDiff(results);
  updateConversions(0);
  updateConversions(1);
}

function updateConversions(idx) {
  const d = DATA[idx];
  const landAreaRaw = num(d.landArea);
  const landPriceRaw = num(d.landPrice);
  const buildingPriceRaw = num(d.buildingPrice);

  // 土地面積: 入力が㎡→坪を表示、坪→㎡を表示
  if (landAreaRaw > 0) {
    if (d.landAreaUnit === 'sqm') {
      document.getElementById('landAreaConv-' + idx).textContent = fmt(landAreaRaw / TSUBO);
      document.getElementById('landAreaConvUnit-' + idx).textContent = '坪';
    } else {
      document.getElementById('landAreaConv-' + idx).textContent = fmt(landAreaRaw * TSUBO);
      document.getElementById('landAreaConvUnit-' + idx).textContent = '㎡';
    }
  } else {
    document.getElementById('landAreaConv-' + idx).textContent = '-';
    document.getElementById('landAreaConvUnit-' + idx).textContent = '';
  }

  // 土地単価
  if (landPriceRaw > 0) {
    if (d.landPriceUnit === 'sqm') {
      document.getElementById('landPriceConv-' + idx).textContent = '¥' + addCommas(Math.round(landPriceRaw * TSUBO));
      document.getElementById('landPriceConvUnit-' + idx).textContent = '円/坪';
    } else {
      document.getElementById('landPriceConv-' + idx).textContent = '¥' + addCommas(Math.round(landPriceRaw / TSUBO));
      document.getElementById('landPriceConvUnit-' + idx).textContent = '円/㎡';
    }
  } else {
    document.getElementById('landPriceConv-' + idx).textContent = '-';
    document.getElementById('landPriceConvUnit-' + idx).textContent = '';
  }

  // 建物単価
  if (buildingPriceRaw > 0) {
    if (d.buildingPriceUnit === 'sqm') {
      document.getElementById('buildingPriceConv-' + idx).textContent = '¥' + addCommas(Math.round(buildingPriceRaw * TSUBO));
      document.getElementById('buildingPriceConvUnit-' + idx).textContent = '円/坪';
    } else {
      document.getElementById('buildingPriceConv-' + idx).textContent = '¥' + addCommas(Math.round(buildingPriceRaw / TSUBO));
      document.getElementById('buildingPriceConvUnit-' + idx).textContent = '円/㎡';
    }
  } else {
    document.getElementById('buildingPriceConv-' + idx).textContent = '-';
    document.getElementById('buildingPriceConvUnit-' + idx).textContent = '';
  }
}

function renderResult(idx, r) {
  const name = NAMES[idx];
  const el = document.getElementById('result-' + idx);
  const rows = [
    ['原価合計', fmtYen(r.costTotal)],
    ['　土地合計', fmtYen(r.landTotal)],
    ['　建物合計', fmtYen(r.buildingTotal)],
    ['月間家賃収入', fmtYen(r.monthlyRent)],
    ['年間家賃収入', fmtYen(r.yearlyRent)],
    ['販売価格', fmtYen(r.salePrice)],
    ['経費合計', fmtYen(r.expenseTotal)],
    ['販売利益', fmtYen(r.profit), r.profit],
    ['販売利益率', fmtPct(r.profitRate * 100), r.profitRate],
    ['利回り', fmtPct(r.yieldRate * 100), r.yieldRate],
    ['税引き後利益', fmtYen(r.afterTax), r.afterTax],
  ];

  el.innerHTML = `<h3>${escHtml(name)}</h3>` + rows.map(([label, value, raw]) => {
    let cls = '';
    if (raw !== undefined) cls = raw >= 0 ? 'positive' : 'negative';
    return `<div class="result-row"><span class="r-label">${label}</span><span class="r-value ${cls}">${value}</span></div>`;
  }).join('');
}

function renderDiff(results) {
  const el = document.getElementById('diff-panel');
  const keys = [
    ['原価合計', 'costTotal', 'yen', 'lower'],
    ['月間家賃収入', 'monthlyRent', 'yen', 'higher'],
    ['年間家賃収入', 'yearlyRent', 'yen', 'higher'],
    ['販売価格', 'salePrice', 'yen', 'higher'],
    ['経費合計', 'expenseTotal', 'yen', 'lower'],
    ['販売利益', 'profit', 'yen', 'higher'],
    ['販売利益率', 'profitRate', 'pct', 'higher'],
    ['利回り', 'yieldRate', 'pct', 'higher'],
    ['税引き後利益', 'afterTax', 'yen', 'higher'],
  ];

  let html = `<h3>比較（差分）</h3>`;
  keys.forEach(([label, key, type, better]) => {
    const a = results[0][key];
    const b = results[1][key];
    const diff = a - b;
    if (a === 0 && b === 0) {
      html += `<div class="diff-row"><span class="d-label">${label}</span><span class="d-value">-</span></div>`;
      return;
    }
    const winner = diff > 0 ? (better === 'higher' ? 'a' : 'b') : diff < 0 ? (better === 'higher' ? 'b' : 'a') : '';
    const diffStr = type === 'pct' ? fmtPct((diff) * 100) : fmtYen(diff);
    const hlClass = winner === 'a' ? 'highlight-a' : winner === 'b' ? 'highlight-b' : '';
    const winLabel = winner === 'a' ? NAMES[0] : winner === 'b' ? NAMES[1] : '';
    html += `<div class="diff-row">
      <span class="d-label">${label}</span>
      <span class="d-value">${diffStr} ${winLabel ? `<span class="${hlClass}">${escHtml(winLabel)}有利</span>` : ''}</span>
    </div>`;
  });
  el.innerHTML = html;
}

// Tabs
function bindTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      if (e.target.classList.contains('tab-name-input')) return;
      const t = parseInt(btn.dataset.tab);
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.form-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById('form-' + t).classList.remove('hidden');
    });
  });

  document.querySelectorAll('.tab-name-input').forEach(inp => {
    inp.addEventListener('input', () => {
      NAMES[parseInt(inp.dataset.idx)] = inp.value || ('件名' + (parseInt(inp.dataset.idx) === 0 ? 'A' : 'B'));
      recalcAll();
    });
    inp.addEventListener('click', (e) => e.stopPropagation());
  });
}

// Helpers
function parseNum(v) {
  if (v === '' || v === undefined || v === null) return '';
  const s = String(v).replace(/,/g, '');
  const n = parseFloat(s);
  return isNaN(n) ? '' : n;
}
function num(v) { const n = parseNum(v); return n === '' ? 0 : n; }
function addCommas(v) {
  const s = String(v);
  const parts = s.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts.join('.');
}
function formatInput(inp) {
  const raw = inp.value.replace(/,/g, '');
  if (raw === '' || raw === '-' || raw === '.') return;
  const n = parseFloat(raw);
  if (isNaN(n)) return;
  const cur = inp.selectionStart;
  const oldLen = inp.value.length;
  const dotIdx = raw.indexOf('.');
  if (dotIdx !== -1) {
    const intPart = raw.substring(0, dotIdx);
    const decPart = raw.substring(dotIdx);
    inp.value = addCommas(intPart) + decPart;
  } else {
    inp.value = addCommas(raw);
  }
  const newLen = inp.value.length;
  const newCur = cur + (newLen - oldLen);
  inp.setSelectionRange(newCur, newCur);
}
function fmt(n) { return addCommas(Number(n.toFixed(2))); }
function fmtYen(n) { return '¥' + addCommas(Math.round(n)); }
function fmtPct(n) { return n.toFixed(2) + '%'; }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

init();
</script>
